server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # App logs (info+) — JSON pipeline
  - job_name: nexa-app
    static_configs:
      - targets:
          - localhost
        labels:
          job: nexa-backend
          log_type: app
          __path__: /var/log/nexa/app-*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            message: message
            service: service
      - labels:
          level:
          service:
      - timestamp:
          source: timestamp
          format: RFC3339Nano

  # Error logs — JSON pipeline
  - job_name: nexa-errors
    static_configs:
      - targets:
          - localhost
        labels:
          job: nexa-backend
          log_type: error
          __path__: /var/log/nexa/error-*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            message: message
      - labels:
          level:
      - timestamp:
          source: timestamp
          format: RFC3339Nano

  # HTTP access logs — JSON pipeline
  - job_name: nexa-http
    static_configs:
      - targets:
          - localhost
        labels:
          job: nexa-backend
          log_type: http
          __path__: /var/log/nexa/http-*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            message: message
      - labels:
          level:
      - timestamp:
          source: timestamp
          format: RFC3339Nano
