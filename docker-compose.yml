name: nexa-app

services:
  db:
    image: postgres:16-alpine  # 16 est stable & rapide en 2026
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 8
    # ports: ["5433:5432"]   # décommente uniquement si besoin d'accès pgAdmin/local


  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    ports:
      - "127.0.0.1:4001:4001"   # only reachable from localhost (nginx reverse-proxy)
    environment:
      NODE_ENV:       production
      PORT:           4001
      DOCKER_ENV:     true
      DATABASE_URL:   postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      POSTGRES_USER:  ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:    ${POSTGRES_DB}
      JWT_SECRET:     ${JWT_SECRET:?required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      BCRYPT_SALT:    ${BCRYPT_SALT:-12}
      FRONTEND_URL:   ${FRONTEND_URL:-https://nexa-tn.com}
      BACKEND_URL:    ${BACKEND_URL:-https://nexa-tn.com}
      # Admin seed vars (only needed on first deploy / manual seed run)
      ADMIN_NOM:          ${ADMIN_NOM:-Admin}
      ADMIN_EMAIL:        ${ADMIN_EMAIL:?required}
      ADMIN_PASSWORD:     ${ADMIN_PASSWORD:?required}
      ADMIN_TELEPHONE:    ${ADMIN_TELEPHONE:-20000000}
      ADMIN_VILLE:        ${ADMIN_VILLE:-Tunis}
      ADMIN_GOUVERNORAT:  ${ADMIN_GOUVERNORAT:-Tunis}
      ADMIN_ADRESSE:      ${ADMIN_ADRESSE:-Tunis, Tunisie}
      # Cloudinary / Email / Twilio — add your values in .env
      CLOUDINARY_CLOUD_NAME:  ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY:     ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET:  ${CLOUDINARY_API_SECRET:-}
    volumes:
      - logs:/app/logs
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./Ecommerce
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-https://nexa-tn.com/api}
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:80"   # only reachable from localhost (nginx reverse-proxy)

  # ── Observability stack ──────────────────────────────────────────────────────

  loki:
    image: grafana/loki:3.0.0
    restart: unless-stopped
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml

  promtail:
    image: grafana/promtail:3.0.0
    restart: unless-stopped
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml:ro
      - logs:/var/log/nexa:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:11.0.0
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER:          ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD:      ${GRAFANA_PASSWORD:-nexa-grafana-2026}
      GF_SERVER_ROOT_URL:              https://nexa-tn.com/grafana/
      GF_SERVER_SERVE_FROM_SUB_PATH:   "true"
      GF_ANALYTICS_REPORTING_ENABLED:  "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - loki

volumes:
  pgdata:
  logs:
  loki-data:
  grafana-data: