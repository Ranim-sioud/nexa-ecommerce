name: Setup Self-Hosted Runner

# ─────────────────────────────────────────────────────────────────────────────
# One-time bootstrap: SSHes into the VPS (using the existing secrets) and
# installs the GitHub Actions runner as a persistent systemd service.
#
# Run this ONCE after the initial runner download/configure on the VPS.
# After it completes, the runner is online and all future deploys use it.
# ─────────────────────────────────────────────────────────────────────────────
on:
  workflow_dispatch:

jobs:
  setup:
    name: Install Runner as Systemd Service
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Connect to VPS and enable runner service
        uses: appleboy/ssh-action@v1.2.0
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e

            RUNNER_DIR="$HOME/actions-runner"

            # ── Guard: runner must already be downloaded + configured ──────────
            if [ ! -d "$RUNNER_DIR" ]; then
              echo "ERROR: $RUNNER_DIR not found."
              echo "Please follow these steps first:"
              echo "  1. GitHub repo → Settings → Actions → Runners → New self-hosted runner"
              echo "  2. Download the runner tarball to ~/actions-runner"
              echo "  3. Run ./config.sh --url <repo-url> --token <token>"
              echo "  4. Then re-run this workflow."
              exit 1
            fi

            cd "$RUNNER_DIR"
            echo "Runner directory: $RUNNER_DIR"

            # ── Check if a systemd service is already registered ──────────────
            EXISTING=$(sudo systemctl list-units --type=service --all --no-legend 2>/dev/null \
                        | grep 'actions\.runner\.' | awk '{print $1}' | head -1)

            if [ -n "$EXISTING" ]; then
              echo "Service already registered: $EXISTING"
              echo "Ensuring it is enabled and running..."
              sudo systemctl enable  "$EXISTING"
              sudo systemctl restart "$EXISTING"
              sleep 3
              sudo systemctl status  "$EXISTING" --no-pager
            else
              echo "Installing runner as systemd service..."
              sudo ./svc.sh install
              sudo ./svc.sh start
              sleep 3
              echo "Service installed and started."
              sudo ./svc.sh status
            fi

            echo ""
            echo "Runner is online. Future deploys will run directly on this VPS."
