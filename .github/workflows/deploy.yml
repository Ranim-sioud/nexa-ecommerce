name: Deploy to Contabo VPS

# ─────────────────────────────────────────────────────────────────────────────
# Runs directly ON the VPS via the self-hosted runner — no SSH needed.
# Bootstrap the runner first with: Actions → setup-runner (manual trigger).
#
# Flow on every push to main:
#   git fetch --all && reset --hard origin/main
#   → docker compose build --no-cache
#   → docker compose up -d
#   → health check  (Dockerfile CMD already runs migrate + seed + server)
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false   # never cancel a running deploy mid-flight

jobs:
  deploy:
    name: Build & Deploy
    runs-on: self-hosted
    timeout-minutes: 20

    env:
      # Matches the APP_DIR secret; falls back to ~/nexa-ecommerce
      APP_DIR: ${{ secrets.APP_DIR }}

    steps:
      # ── 1. Pull latest code ───────────────────────────────────────────────
      - name: Pull latest code
        run: |
          set -e
          cd "${APP_DIR:-$HOME/nexa-ecommerce}"

          git fetch --all
          git reset --hard origin/main
          echo "HEAD is now: $(git log -1 --oneline)"

      # ── 2. Verify .env present ────────────────────────────────────────────
      - name: Verify .env
        run: |
          set -e
          cd "${APP_DIR:-$HOME/nexa-ecommerce}"
          [ -f .env ] || { echo "ERROR: .env missing — place it in $APP_DIR first"; exit 1; }
          echo ".env present"

      # ── 3. Build & start containers ───────────────────────────────────────
      # Dockerfile CMD runs: initial_db.js (migrate + idempotent seed) → npm start
      - name: Build and start containers
        run: |
          set -e
          cd "${APP_DIR:-$HOME/nexa-ecommerce}"

          docker compose build --no-cache
          docker compose up -d --remove-orphans

      # ── 4. Health check ───────────────────────────────────────────────────
      - name: Wait for backend health
        run: |
          set -e
          cd "${APP_DIR:-$HOME/nexa-ecommerce}"

          echo "Waiting for backend to become healthy..."
          sleep 10
          docker compose exec -T backend \
            node -e "require('http').get('http://localhost:4001/api/health', r => {
              console.log('Status:', r.statusCode);
              process.exit(r.statusCode === 200 ? 0 : 1);
            })" \
          || { docker compose logs backend --tail 60; exit 1; }

          echo "Deploy complete!"

      # ── 5. Notify on failure ──────────────────────────────────────────────
      - name: Notify failure
        if: failure()
        run: echo "Deploy failed — check the logs above."
