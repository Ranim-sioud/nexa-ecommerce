services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nexadb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
      POSTGRES_DB: ${POSTGRES_DB:-nexa}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "4001"                  # internal only
    environment:
      - NODE_ENV=production
      - PORT=4001
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      # Add other vars: JWT_SECRET, CLOUDINARY_URL, etc.
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./Ecommerce
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "80"

volumes:
  pgdata: