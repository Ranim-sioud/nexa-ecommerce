# /etc/nginx/sites-available/nexa-tn.com
# Symlink: sudo ln -s /etc/nginx/sites-available/nexa-tn.com /etc/nginx/sites-enabled/

# ── Redirect HTTP → HTTPS ────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name nexa-tn.com www.nexa-tn.com;

    # Let's Encrypt / Certbot will add its own location block here
    location /.well-known/acme-challenge/ { root /var/www/certbot; }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS — main virtual host ─────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name nexa-tn.com www.nexa-tn.com;

    # SSL — managed by Certbot (run: sudo certbot --nginx -d nexa-tn.com -d www.nexa-tn.com)
    ssl_certificate     /etc/letsencrypt/live/nexa-tn.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nexa-tn.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options        SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff    always;
    add_header Referrer-Policy        strict-origin-when-cross-origin always;

    # ── API → backend container (port 4001) ───────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:4001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        client_max_body_size 15m;
    }

    # ── Grafana → grafana container (port 3001) ───────────────────────────────
    location /grafana/ {
        proxy_pass         http://127.0.0.1:3001/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Frontend → frontend container (port 80 → mapped to host 3000) ─────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Needed for SPA: pass 404s back to the frontend container (nginx handles them)
        proxy_intercept_errors off;
    }
}
