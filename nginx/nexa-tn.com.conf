# /etc/nginx/sites-available/nexa-tn.com
# Symlink: sudo ln -s /etc/nginx/sites-available/nexa-tn.com /etc/nginx/sites-enabled/
#
# DEPLOY SEQUENCE:
#   1. Copy this file, symlink it, sudo nginx -t && sudo systemctl reload nginx
#   2. Site is live on HTTP immediately.
#   3. Install SSL: sudo certbot --nginx -d nexa-tn.com -d www.nexa-tn.com
#   4. Certbot auto-adds the redirect in the HTTP block and fills in the HTTPS block.

# ── HTTP — serves the full app (pre-SSL or with SSL redirect once cert is installed) ──
server {
    listen 80;
    listen [::]:80;
    server_name nexa-tn.com www.nexa-tn.com;

    # Let's Encrypt / Certbot ACME challenge
    location /.well-known/acme-challenge/ { root /var/www/certbot; }

    # ── API → backend container (port 4001) ───────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:4001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        client_max_body_size 15m;
    }

    # ── Grafana → grafana container (port 3001) ───────────────────────────────
    location /grafana/ {
        proxy_pass         http://127.0.0.1:3001/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Frontend → frontend container (port 80 → mapped to host 3000) ─────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_intercept_errors off;
    }
}

